<section class="teachers flex flex-col gap-6">
  <div class="head flex justify-between items-center">
    <div class="titles flex flex-col gap-3">
      <h2 class="text-[32px] font-bold leading-[40px] text-[#000000]">{{ t.translate('sidebar.Teachers')}}</h2>
      <div class="navigation">
        <app-breadcrumb
          [subTitles]="[ 
            { name: t.translate('sidebar.Dashboard'), routerLink: '/' }, 
            { name: t.translate('sidebar.Teachers'), routerLink: '/teachers' }
          ]">
        </app-breadcrumb>
      </div>
    </div>
    <div class="add-teacher">
      <button
        class="bg-red-500 min-w-[143px] flex items-center justify-center gap-2 text-white main-color rounded-lg py-2.5 px-3"
        (click)="addTeacher()">
        <div class="icon">
          <app-icons [iconKey]="'add'"></app-icons>
        </div>
        <span class="text-[15px]">{{ t.translate('teachers.Add Teacher')}}</span>
      </button>
    </div>
  </div>

  <div class="data w-full flex flex-col gap-5 bg-white rounded-[20px]">
    <div class="table w-full">
      <app-data-table 
        [data]="data()" 
        [columns]="cols()" 
        [actionsTemplate]="actions"
        [totalPageCount]="data().length">
      </app-data-table>
    </div>

    <ng-template #actions let-row>
      <div class="flex justify-center items-center gap-[14px]">
        <button class="edit" (click)="editTeacher(row)">
          <app-icons [iconKey]="'edit'"></app-icons>
        </button>
        <button class="delete" (click)="deleteTeacher(row)">
          <app-icons [iconKey]="'delete'"></app-icons>
        </button>
      </div>
    </ng-template>
  </div>
</section>

<!-- Add/Edit Teacher Dialog -->
<p-dialog 
    header="{{isEditMode()? 'Edit Teacher' : 'Add Teacher'}}" 
    [modal]="true" 
    [(visible)]="isVisibleAddEdit"
    [style]="{ width: '30rem'}" 
    [closable]="false">
  <form [formGroup]="teacherForm" (ngSubmit)="onSubmitData()">
    <div class="content flex flex-col gap-5">
      <div class="name flex flex-col gap-2">
        <label>Name</label>
        <input type="text" formControlName="name" placeholder="Name" class="w-full border rounded-lg p-3 focus:outline-none placeholder:text-[#B3B3B3]" />
      </div>
      <div class="specialization flex flex-col gap-2">
        <label>Specialization</label>
        <input type="text" formControlName="specialization" placeholder="Specialization" class="w-full border rounded-lg p-3 focus:outline-none placeholder:text-[#B3B3B3]" />
      </div>
      <div class="email flex flex-col gap-2">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="Email" class="w-full border rounded-lg p-3 focus:outline-none placeholder:text-[#B3B3B3]" />
      </div>
      <div class="phone flex flex-col gap-2">
        <label>Phone</label>
        <input type="number" formControlName="phone" placeholder="Phone" class="w-full border rounded-lg p-3 focus:outline-none placeholder:text-[#B3B3B3]" />
      </div>
      <div class="rating flex flex-col gap-2">
        <label>Rating</label>
        <input type="number" formControlName="rating" placeholder="Rating" class="w-full border rounded-lg p-3 focus:outline-none placeholder:text-[#B3B3B3]" />
      </div>
    </div>

    <div class="actions flex gap-2 w-full mt-8">
      <div class="w-1/2">
        <button type="submit" class="min-w-[130px] main-color flex items-center justify-center gap-2 text-white bg-red-600 rounded-lg py-2 px-3 w-full">
          {{isEditMode()? 'Edit' : 'Add'}}
        </button>
      </div>
      <div class="w-1/2">
        <button type="button" class="min-w-[130px] flex items-center justify-center gap-2 border border-[#4D0F23] text-[#4D0F23] rounded-lg py-1.5 px-3 w-full"
          (click)="isVisibleAddEdit.set(false)">
          Close
        </button>
      </div>
    </div>
  </form>
</p-dialog>

<!-- Delete Teacher Dialog -->
<p-dialog 
    header="Delete Teacher" 
    [modal]="true" 
    [(visible)]="isVisibleDelete" 
    [style]="{ width: '30rem', color:'#DC2626' }"
    [closable]="false">
  <div class="mb-5 text-black">
    <h3>Are you sure you want to delete this teacher?</h3>
  </div> 
  <div class="flex gap-2 w-full">
    <div class="w-1/2">
      <button class="min-w-[130px] main-color flex items-center justify-center gap-2 text-white bg-red-600 rounded-lg py-2 px-3 w-full"
        (click)="confirmDeleteTeacher()">
        Delete
      </button>
    </div>
    <div class="w-1/2">
      <button class="min-w-[130px] flex items-center justify-center gap-2 border border-[#4D0F23] text-[#4D0F23] rounded-lg py-1.5 px-3 w-full"
        (click)="isVisibleDelete.set(false)">
        Close
      </button>
    </div>
  </div>
</p-dialog>
