<section class="courses flex flex-col gap-6">
    <div class="head flex justify-between items-center">
        <div class="titles flex flex-col gap-3">
            <h2 class="text-[32px] font-bold leading-[40px] text-[#000000]">{{ t.translate('sidebar.Courses')}}</h2>
            <div class="navigation">
                <app-breadcrumb
                    [subTitles]="[ { name: t.translate('sidebar.Dashboard'), routerLink: '/' }, { name: t.translate('sidebar.Courses'), routerLink: '/courses' }]">
                </app-breadcrumb>
            </div>
        </div>
        <div class="add-note">
            <button
                class="bg-red-500 min-w-[143px] flex items-center justify-center gap-2 text-white main-color rounded-lg py-2.5 px-3"
                (click)="addCourse()">
                <div class="icon">
                    <app-icons [iconKey]="'add'"></app-icons>
                </div>
                <span class="text-[15px]">{{ t.translate('courses.Add Course')}}</span>
            </button>
        </div>
    </div>

    <div class="data w-full flex flex-col gap-5 bg-white rounded-[20px]">
        <div class="table w-full">
            <app-data-table [data]="data()" [columns]="cols()" [actionsTemplate]="actions"
                [totalPageCount]="data().length" [actionsLabel]="t.translate('general.Actions')" [prevLabel]="t.translate('general.Previous')"  [nextLabel]="t.translate('general.Next')" >
            </app-data-table>
        </div>
        <ng-template #actions let-row>
            <div class="flex justify-center items-center gap-[14px]">
                <button class="edit" (click)="editCourse(row)">
                    <app-icons [iconKey]="'edit'"></app-icons>
                </button>
                <button class="delete" (click)="deleteCourse(row)">
                    <app-icons [iconKey]="'delete'"></app-icons>
                </button>
            </div>
        </ng-template>
    </div>
</section>

<p-dialog header="{{isEditMode()? 'Edit Course' : 'Add Course'}}" [modal]="true" [(visible)]="isVisibleAddEdit"
    [style]="{ width: '30rem'}" [closable]="false">
    <form [formGroup]="courseForm" (ngSubmit)="onSubmit()">
        <div class="content flex flex-col gap-5">

            <div class="name flex flex-col gap-2">
                <label>Name</label>
                <input type="text" formControlName="name" placeholder="Course Name"
                    class="w-full border rounded-lg p-3 focus:outline-none" />
                <div *ngIf="isInvalid('name')" class="text-red-500 text-sm">Please enter course name</div>
            </div>

            <div class="teachers flex flex-col gap-2">
                <label>Teacher IDs</label>
                <input type="number" formControlName="teacherIds" placeholder="Comma separated IDs"
                    class="w-full border rounded-lg p-3 focus:outline-none" />
                <div *ngIf="isInvalid('teacherIds')" class="text-red-500 text-sm">Please enter teacher IDs</div>
            </div>

            <div class="students flex flex-col gap-2">
                <label>Student IDs</label>
                <input type="number" formControlName="studentIds" placeholder="Comma separated IDs"
                    class="w-full border rounded-lg p-3 focus:outline-none" />
                <div *ngIf="isInvalid('studentIds')" class="text-red-500 text-sm">Please enter student IDs</div>
            </div>

            <div class="schedule flex flex-col gap-2">
                <label>Schedule</label>
                <input type="text" formControlName="schedule" placeholder="Course Schedule"
                    class="w-full border rounded-lg p-3 focus:outline-none" />
                <div *ngIf="isInvalid('schedule')" class="text-red-500 text-sm">Please enter schedule</div>
            </div>

            <div class="materials flex flex-col gap-2">
                <label>Materials</label>
                <input type="text" formControlName="materials" placeholder="Comma separated files"
                    class="w-full border rounded-lg p-3 focus:outline-none" />
                <div *ngIf="isInvalid('materials')" class="text-red-500 text-sm">Please enter materials</div>
            </div>

        </div>

        <div class="actions flex gap-2 w-full mt-8">
            <div class="w-1/2">
                <button type="submit" [disabled]="courseForm.invalid"
                    class="min-w-[130px] main-color flex items-center justify-center gap-2 text-white bg-red-600 rounded-lg py-2 px-3 w-full">{{isEditMode()
                    ? 'Edit' : 'Add'}}</button>
            </div>
            <div class="w-1/2">
                <button type="button"
                    class="min-w-[130px] border border-[#4D0F23] text-[#4D0F23] rounded-lg py-2 w-full"
                    (click)="isVisibleAddEdit.set(false)">Close</button>
            </div>
        </div>
    </form>
</p-dialog>

<p-dialog header="Delete Course" [modal]="true" [(visible)]="isVisibleDelete"
    [style]="{ width: '30rem', color:'#DC2626' }" [closable]="false">
    <div class="mb-5 text-black">
        <h3>Are you sure you want to delete this course?</h3>
    </div>
    <div class="flex gap-2 w-full">
        <div class="w-1/2">
            <button
                class="min-w-[130px] main-color flex items-center justify-center gap-2 text-white bg-red-600 rounded-lg py-2 px-3 w-full"
                (click)="confirmDeleteCourse()">
                Delete
            </button>
        </div>
        <div class="w-1/2">
            <button
                class="min-w-[130px] flex items-center justify-center gap-2 border border-[#4D0F23] text-[#4D0F23] rounded-lg py-1.5 px-3 w-full"
                (click)="isVisibleDelete.set(false)">
                Close
            </button>
        </div>
    </div>
</p-dialog>
